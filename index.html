<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园绿色守护计划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 { 
            color: #065f46;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #059669;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        #tree { 
            font-size: 100px;
            margin: 30px 0;
            min-height: 150px;
            position: relative;
        }
        
        .leaf { 
            display: inline-block; 
            animation: grow 0.6s ease-out;
            margin: 2px;
            position: relative;
        }
        
        @keyframes grow { 
            0% { 
                transform: scale(0) translateY(-20px);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) translateY(-5px);
            }
            100% { 
                transform: scale(1) translateY(0);
                opacity: 1;
            } 
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .actions-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .action-card {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border: 2px solid #10b981;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
        }
        
        .action-card:active {
            transform: translateY(-2px);
        }
        
        .action-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        .action-title {
            font-size: 16px;
            color: #065f46;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .action-button {
            padding: 12px 20px;
            font-size: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .action-button:hover {
            background: #059669;
        }
        
        .action-button:active {
            transform: scale(0.95);
        }
        
        .action-count {
            font-size: 18px;
            color: #10b981;
            font-weight: bold;
            margin-top: 8px;
        }
        
        .stats-section {
            margin: 40px 0;
            background: #f0fdf4;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #dcfce7;
        }
        
        .stats-title {
            color: #065f46;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .progress-container {
            margin: 15px 0;
        }
        
        .progress-label {
            color: #059669;
            font-size: 14px;
            margin-bottom: 8px;
            text-align: left;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0f2fe;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #bfdbfe;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            width: 0%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #dcfce7;
        }
        
        .stat-label {
            color: #6b7280;
            font-size: 12px;
        }
        
        .stat-value {
            color: #10b981;
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .celebration {
            position: fixed;
            pointer-events: none;
            font-size: 30px;
            animation: celebrate 1s ease-out;
        }
        
        @keyframes celebrate {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }
        
        footer {
            margin-top: 30px;
            color: #6b7280;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 校园绿色守护计划</h1>
        <p class="subtitle">让我们一起为校园添绿，保护地球家园！</p>
        
        <!-- 树 -->
        <div id="tree">🌳</div>
        
        <!-- 三项行动 -->
        <div class="actions-container">
            <!-- 光盘行动 -->
            <div class="action-card">
                <div class="action-icon">🍽️</div>
                <div class="action-title">光盘行动</div>
                <p style="font-size: 12px; color: #6b7280; margin-bottom: 10px;">完成一次光盘</p>
                <button class="action-button" onclick="addAction('cleanplate')">我做到了！</button>
                <div class="action-count"><span id="count-cleanplate">0</span> 次</div>
            </div>
            
            <!-- 垃圾入桶 -->
            <div class="action-card">
                <div class="action-icon">🗑️</div>
                <div class="action-title">垃圾入桶</div>
                <p style="font-size: 12px; color: #6b7280; margin-bottom: 10px;">垃圾丢进垃圾桶</p>
                <button class="action-button" onclick="addAction('garbage')">我做到了！</button>
                <div class="action-count"><span id="count-garbage">0</span> 次</div>
            </div>
            
            <!-- 减少塑料 -->
            <div class="action-card">
                <div class="action-icon">♻️</div>
                <div class="action-title">减少塑料</div>
                <p style="font-size: 12px; color: #6b7280; margin-bottom: 10px;">减少塑料垃圾使用</p>
                <button class="action-button" onclick="addAction('plastic')">我做到了！</button>
                <div class="action-count"><span id="count-plastic">0</span> 次</div>
            </div>
        </div>
        
        <!-- 统计数据 -->
        <div class="stats-section">
            <div class="stats-title">📊 校园环保成果</div>
            
            <!-- 总进度条 -->
            <div class="progress-container">
                <div class="progress-label">总环保行动: <span id="total-actions">0</span> / 100 (目标)</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
                </div>
            </div>
            
            <!-- 各项统计 -->
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">🍽️ 光盘行动</div>
                    <div class="stat-value" id="stat-cleanplate">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">🗑️ 垃圾入桶</div>
                    <div class="stat-value" id="stat-garbage">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">♻️ 减少塑料</div>
                    <div class="stat-value" id="stat-plastic">0</div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>💚 让我们共同保护地球 • 每一个小行动都很重要！</p>
        </footer>
    </div>

    <script>
        // 数据对象
        const actions = {
            cleanplate: { count: 0, icon: '🍃', color: '#fbbf24', name: '光盘' },
            garbage: { count: 0, icon: '🌿', color: '#34d399', name: '入桶' },
            plastic: { count: 0, icon: '🍂', color: '#60a5fa', name: '减塑' }
        };
        
        // 从本地存储加载数据
        function loadData() {
            const saved = localStorage.getItem('greenActions');
            if (saved) {
                const data = JSON.parse(saved);
                actions.cleanplate.count = data.cleanplate || 0;
                actions.garbage.count = data.garbage || 0;
                actions.plastic.count = data.plastic || 0;
                updateDisplay();
            }
        }
        
        // 保存数据到本地存储
        function saveData() {
            localStorage.setItem('greenActions', JSON.stringify({
                cleanplate: actions.cleanplate.count,
                garbage: actions.garbage.count,
                plastic: actions.plastic.count
            }));
        }
        
        // 添加行动
        function addAction(type) {
            actions[type].count++;
            
            // 添加树叶
            const tree = document.getElementById('tree');
            const leaf = document.createElement('span');
            leaf.className = 'leaf';
            leaf.innerHTML = actions[type].icon;
            leaf.style.color = actions[type].color;
            tree.appendChild(leaf);
            
            // 庆祝动画
            createCelebration(actions[type].icon);
            
            // 更新显示
            updateDisplay();
            
            // 保存数据
            saveData();
        }
        
        // 创建庆祝效果
        function createCelebration(emoji) {
            const celebration = document.createElement('div');
            celebration.className = 'celebration';
            celebration.innerHTML = emoji;
            celebration.style.left = Math.random() * window.innerWidth + 'px';
            celebration.style.top = Math.random() * window.innerHeight + 'px';
            celebration.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
            celebration.style.setProperty('--ty', (Math.random() - 0.5) * 200 - 100 + 'px');
            document.body.appendChild(celebration);
            
            setTimeout(() => celebration.remove(), 1000);
        }
        
        // 更新显示
        function updateDisplay() {
            // 更新计数
            document.getElementById('count-cleanplate').innerText = actions.cleanplate.count;
            document.getElementById('count-garbage').innerText = actions.garbage.count;
            document.getElementById('count-plastic').innerText = actions.plastic.count;
            
            // 更新统计盒子
            document.getElementById('stat-cleanplate').innerText = actions.cleanplate.count;
            document.getElementById('stat-garbage').innerText = actions.garbage.count;
            document.getElementById('stat-plastic').innerText = actions.plastic.count;
            
            // 计算总数
            const total = actions.cleanplate.count + actions.garbage.count + actions.plastic.count;
            document.getElementById('total-actions').innerText = total;
            
            // 更新进度条
            const percentage = Math.min((total / 100) * 100, 100);
            const progressFill = document.getElementById('progress-fill');
            progressFill.style.width = percentage + '%';
            progressFill.innerHTML = Math.round(percentage) + '%';
        }
        
        // 页面加载时初始化
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
